<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">

                <div class="alert alert-success" role="alert">
                    <strong>Payment Successful!</strong> Your ticket has been confirmed.
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Booking Confirmed</h5>
                        <p class="card-text">Thank you for your purchase. A confirmation has been sent to your email.</p>
                        <ul class="list-group list-group-flush mb-3">
                            <li class="list-group-item">Status: <strong>Confirmed</strong></li>
                            <li class="list-group-item">Amount Paid: <strong>$0.00</strong></li>
                            <li class="list-group-item">Confirmation #: <strong>TKT-00001</strong></li>
                        </ul>
                        <div class="row g-2">
                            <div class="col-6 col-lg-4">
                                <a href="dashboard.html" class="btn btn-success w-100">Go to Dashboard</a>
                            </div>
                            <div class="col-6 col-lg-4">
                                <a href="find-ticket.html" class="btn btn-secondary w-100">Find Another Ticket</a>
                            </div>
                            <div class="col-12 col-lg-4">
                                <a href="payment-error.html" class="btn btn-outline-danger w-100">Simulate Denied</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
