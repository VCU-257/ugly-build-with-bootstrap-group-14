<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Pay Ticket</h1>
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Enter Payment Details</h5>
                        <p class="card-text">Pay parking ticket <strong>PT-20481</strong> for <strong>$45.00</strong>.</p>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Name on Card</label>
                                <input type="text" class="form-control" placeholder="John Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Card Number</label>
                                <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="row g-3">
                                <div class="col-12 col-md-4">
                                    <label class="form-label">Expiration Date</label>
                                    <input type="text" class="form-control" placeholder="MM/YY">
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label">CVV</label>
                                    <input type="text" class="form-control" placeholder="123">
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label">Billing ZIP Code</label>
                                    <input type="text" class="form-control" placeholder="23220">
                                </div>
                            </div>
                            <div class="row g-2 mt-4">
                                <div class="col-12 col-md-6">
                                    <a href="payment-success.html" class="btn btn-success w-100">Submit Payment</a>
                                </div>
                                <div class="col-12 col-md-6">
                                    <a href="payment-error.html" class="btn btn-outline-danger w-100">Simulate Payment Failure</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
