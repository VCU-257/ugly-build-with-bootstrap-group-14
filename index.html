<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container col-12 col-lg-6">
        <h1 class="text-center m-5">Login</h1>
        <form>
            <div class="mx-auto justify-content-center text-center">
                <label for="email-input" class="form-label m-3">Email Address</label> 
                <input type="email" class="form-control" id="email-input" placeholder="Email">
                <label for="password-input" class="form-label m-3">Password</label> 
                <input type="password" class="form-control" id="password-input" placeholder="Password">
                <a class="btn btn-primary m-3 w-25" href="dashboard.html">Login</a>
                <a class="btn btn-secondary w-25" href="login-error.html">Error</a>
            </div>
        </form>
    </div>
</body>
</html>
