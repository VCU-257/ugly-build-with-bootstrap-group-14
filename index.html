<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Login</h1>
        <form>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 text-center">
                    <p class="text-muted mb-4">Log in to view and pay your parking tickets.</p>
                    <label for="email-input" class="form-label mt-3">Email Address</label>
                    <input type="email" class="form-control" id="email-input" placeholder="name@example.com">
                    <label for="password-input" class="form-label mt-3">Password</label>
                    <input type="password" class="form-control" id="password-input" placeholder="Password">
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">
                        <a class="btn btn-primary" href="dashboard.html">Login</a>
                        <a class="btn btn-outline-secondary" href="login-error.html">Simulate Login Failure</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
