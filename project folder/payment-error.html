<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
                    <i class="bi bi-x-circle-fill me-2 fs-4"></i>
                    <div>
                        <strong>Payment Failed.</strong> There was an issue processing your payment.
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3">
                            <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Payment Unsuccessful
                        </h5>
                        <p class="card-text">Your payment could not be completed. This may be due to insufficient funds, an expired card, or incorrect billing information.</p>
                        <ul class="list-group list-group-flush mb-4">
                            <li class="list-group-item">Status: <strong>Failed</strong></li>
                            <li class="list-group-item">Amount: <strong>$50.00</strong></li>
                        </ul>
                        <div class="row g-2">
                            <div class="col-12 col-md-6">
                                <a href="payment.html" class="btn btn-danger w-100">
                                    <i class="bi bi-arrow-clockwise me-1"></i>Try Again
                                </a>
                            </div>
                            <div class="col-12 col-md-6">
                                <a href="dashboard.html" class="btn btn-secondary w-100">
                                    <i class="bi bi-x-lg me-1"></i>Cancel
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
