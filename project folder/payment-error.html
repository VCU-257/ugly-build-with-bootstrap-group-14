<!DOCTYPE html>
<html>
<head>
    <title>Payment Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">

                <div class="alert alert-danger" role="alert">
                    <strong>Payment Failed.</strong> There was an issue processing your payment. Please try again.
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Payment Unsuccessful</h5>
                        <p class="card-text">Your payment could not be completed. This may be due to insufficient funds, an expired card, or incorrect billing information.</p>
                        <ul class="list-group list-group-flush mb-3">
                            <li class="list-group-item">Status: <strong>Failed</strong></li>
                            <li class="list-group-item">Amount: <strong>$0.00</strong></li>
                        </ul>
                        <div class="row">
                            <div class="col-6 col-lg-4">
                                <a href="payment.html" class="btn btn-danger w-100">Try Again</a>
                            </div>
                            <div class="col-6 col-lg-4">
                                <a href="dashboard.html" class="btn btn-secondary w-100">Cancel</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
