<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Ticket Details</h1>
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Event Ticket</h5>
                        <p class="card-text">Here are your ticket details.</p>
                        
                    <!--prop data-->
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item">Ticket ID: <strong>TKT-12345</strong></li>
                        <li class="list-group-item">Event: <strong>Concert Night</strong></li>
                        <li class="list-group-item">Date: <strong>April 20, 2026</strong></li>
                        <li class="list-group-item">Seat: <strong>A12</strong></li>
                        <li class="list-group-item">Price: <strong>$50.00</strong></li>
                        <li class="list-group-item">Status: <strong>Unpaid</strong></li>
                    </ul>
                    <div class="row">
                        <div class="col-6 col-lg-4">
                            <a href="payment.html" class="btn btn-secondary w-100">Proceed to Payment</a>
                        </div>
                        <div class="col-6 col-lg-4">
                            <a href="find-ticket.html" class="btn btn-outline-secondary w-100">Back to Search</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
