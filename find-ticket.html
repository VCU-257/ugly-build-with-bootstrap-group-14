<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Find Ticket</h1>
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <p class="text-muted text-center mb-3">Enter a parking ticket ID or license plate to search.</p>
                <label for="ticket-search" class="form-label">Ticket ID or License Plate</label>
                <input type="text" class="form-control mb-3" id="ticket-search" placeholder="PT-20481 or VCU-4271">
                <a href="ticket-details.html" class="btn btn-primary w-100">Search</a>
            </div>
         </div>
    </div>
</body>
</html>
