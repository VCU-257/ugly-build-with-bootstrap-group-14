<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <h1 class="text-center mb-4">Payment Failed</h1>

                <div class="alert alert-danger" role="alert">
                    <strong>Payment Failed.</strong> We couldn't process your payment. Please try again.
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Parking Ticket Payment</h5>
                        <p class="card-text">We couldn't process the payment for parking ticket <strong>PT-20481</strong>. Check your card details and try again.</p>
                        <ul class="list-group list-group-flush mb-3">
                            <li class="list-group-item">Ticket ID: <strong>PT-20481</strong></li>
                            <li class="list-group-item">Amount Due: <strong>$45.00</strong></li>
                            <li class="list-group-item">Status: <strong>Unpaid</strong></li>
                        </ul>
                        <div class="row g-2">
                            <div class="col-12 col-md-6">
                                <a href="payment.html" class="btn btn-danger w-100">Try Again</a>
                            </div>
                            <div class="col-12 col-md-6">
                                <a href="ticket-details.html" class="btn btn-secondary w-100">Cancel</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
